version: '3.8'

services:
  db:
    image: mongo
    container_name: free5gc-test-mongo
    environment:
      - MONGO_INITDB_DATABASE=free5gc
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_test:/data/db
  webui:
    container_name: webui
    image: free5gc/webui
    command: ./webui -c ./config/webuicfg.yaml
    expose:
      - "2121"
    volumes:
      - ./webui/webuicfg.yaml:/free5gc/config/webuicfg.yaml
    environment:
      - GIN_MODE=release
    ports:
      - "30500:5000"
      - "2122:2122"
      - "2121:2121"
    depends_on:
      - db
