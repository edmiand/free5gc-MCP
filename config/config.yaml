
# Example configuration for free5GC MCP
server:
  addr: ":8080"
  api_token: "" # token required by MCP clients (LLM) to call MCP; set to empty to disable
  api_token_type: "" # "static" | "jwt" | "" (none). If "jwt", MCP will validate incoming JWTs.
  # JWT settings (if using HS256 put secret here, or use RS256 and provide public key path)
  jwt_secret: ""
  jwt_public_key_path: ""
free5gc:
  webui_base_url: "http://127.0.0.1:30500" # configure your free5GC WebUI backend
  username: "admin" # webconsole login username
  password: "free5gc" # webconsole login password - CHANGE THIS IN PRODUCTION!
  free5gc_path: "" # path to free5gc directory for core control (start/stop/status), e.g., /home/username/free5gc

