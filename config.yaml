
# Example configuration for free5GC MCP
server:
  addr: ":8080"
  api_token: "" # token required by MCP clients (LLM) to call MCP; set to empty to disable
  api_token_type: "" # "static" | "jwt" | "" (none). If "jwt", MCP will validate incoming JWTs.
  # JWT settings (if using HS256 put secret here, or use RS256 and provide public key path)
  jwt_secret: ""
  jwt_public_key_path: ""
free5gc:
  webui_base_url: "http://127.0.0.1:5000" # configure your free5GC WebUI backend
  token: "" # token used when MCP calls the free5GC WebUI backend
  subscribers_path: "/api/subscribers"
infrastructure:
  use_microk8s: false
